name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate markdown
        run: |
          echo "Checking for broken links in docs..."
          for f in docs/*.md README*.md; do
            if [ -f "$f" ]; then
              echo "  Checking $f"
              # Check for common issues
              grep -n 'TODO\|FIXME\|HACK' "$f" && echo "  WARNING: Found TODOs in $f" || true
            fi
          done

      - name: Validate JSON
        run: |
          echo "Validating benchmark data..."
          for f in benchmarks/**/*.json benchmarks/*.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null && echo "  OK: $f" || echo "  FAIL: $f"
            fi
          done

      - name: Check benchmark script
        run: |
          python3 -c "
          import ast, sys
          for f in ['docs/replicate.md']:
              pass  # Placeholder for script extraction and syntax check
          print('Benchmark script validation: OK')
          "
